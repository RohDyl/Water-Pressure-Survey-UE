<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Supply Survey</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #eef4fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .card-header h1 {
      font-size: 24px;
      color: #1a3c5e;
      margin-bottom: 6px;
    }

    .card-header p {
      color: #6b7c93;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: 600;
      color: #1a3c5e;
      margin-bottom: 8px;
      font-size: 15px;
    }

    label span.required {
      color: #e74c3c;
      margin-left: 3px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #d0dce8;
      border-radius: 8px;
      font-size: 15px;
      color: #333;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #2980b9;
    }

    textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #d0dce8;
      border-radius: 8px;
      font-size: 15px;
      color: #333;
      outline: none;
      resize: vertical;
      min-height: 120px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #2980b9;
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: #6b7c93;
      margin-top: 4px;
    }

    .radio-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .radio-option {
      flex: 1;
      min-width: 120px;
    }

    .radio-option input[type="radio"] {
      display: none;
    }

    .radio-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border: 2px solid #d0dce8;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      color: #444;
      transition: all 0.2s;
      text-align: center;
    }

    .radio-option input[type="radio"]:checked + label {
      border-color: #2980b9;
      background: #eaf4fd;
      color: #1a3c5e;
      font-weight: 600;
    }

    .radio-option label:hover {
      border-color: #7fb3d3;
      background: #f5faff;
    }

    .radio-option .emoji {
      font-size: 20px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #2980b9;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    button[type="submit"]:hover {
      background: #1a6395;
    }

    button[type="submit"]:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }

    .message {
      display: none;
      padding: 14px 18px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="icon">💧</div>
      <h1>Water Supply Survey</h1>
      <p>Please provide your details below so we can assess our area's water pressure supply.</p>
    </div>

    <form id="surveyForm">

      <div class="form-group">
        <label for="address">
          Property Address <span class="required">*</span>
        </label>
        <input type="text" id="address" placeholder="e.g. 12 Maple Street, Springfield, SP1 2AB" required="">
      </div>

      <div class="form-group">
        <label>
          Do you experience low water pressure? <span class="required">*</span>
        </label>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" id="pressureYes" name="lowPressure" value="Yes" required="">
            <label for="pressureYes">
              <span class="emoji">⚠️</span> Yes
            </label>
          </div>
          <div class="radio-option">
            <input type="radio" id="pressureNo" name="lowPressure" value="No">
            <label for="pressureNo">
              <span class="emoji">✅</span> No
            </label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>
          Does your water feed from above or below your property? <span class="required">*</span>
        </label>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" id="feedAbove" name="feedDirection" value="Above" required="">
            <label for="feedAbove">
              <span class="emoji">⬆️</span> Above
            </label>
          </div>
          <div class="radio-option">
            <input type="radio" id="feedBelow" name="feedDirection" value="Below">
            <label for="feedBelow">
              <span class="emoji">⬇️</span> Below
            </label>
          </div>
          <div class="radio-option">
            <input type="radio" id="feedUnsure" name="feedDirection" value="Unsure">
            <label for="feedUnsure">
              <span class="emoji">❓</span> Unsure
            </label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="comments">Additional Comments <span style="color:#6b7c93; font-weight:400;">(optional)</span></label>
        <textarea id="comments" placeholder="Please share any additional details about your water supply issues..." maxlength="500"></textarea>
        <div class="char-count"><span id="charCount">0</span> / 500</div>
      </div>

      <button type="submit" id="submitBtn">
        <span id="btnText">Submit Survey</span>
        <div class="spinner" id="spinner"></div>
      </button>

    </form>

    <div class="message success" id="successMsg">
      ✅ Thank you! Your response has been recorded successfully.
    </div>
    <div class="message error" id="errorMsg">
      ❌ Something went wrong. Please try again or contact us directly.
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_fQmVe4MklYbjXpvf6DudDxZSqicCKk-kbkNw1Xci2vLslY7a-6BY-e8aDlxh8uNzHA/exec";

    const form = document.getElementById("surveyForm");
    const submitBtn = document.getElementById("submitBtn");
    const btnText = document.getElementById("btnText");
    const spinner = document.getElementById("spinner");
    const successMsg = document.getElementById("successMsg");
    const errorMsg = document.getElementById("errorMsg");
    const commentsField = document.getElementById("comments");
    const charCount = document.getElementById("charCount");

    commentsField.addEventListener("input", function() {
      charCount.textContent = commentsField.value.length;
    });

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const address = document.getElementById("address").value.trim();
      const lowPressure = document.querySelector('input[name="lowPressure"]:checked')?.value;
      const feedDirection = document.querySelector('input[name="feedDirection"]:checked')?.value;
      const comments = commentsField.value.trim();

      if (!address || !lowPressure || !feedDirection) {
        alert("Please complete all fields before submitting.");
        return;
      }

      submitBtn.disabled = true;
      btnText.style.display = "none";
      spinner.style.display = "block";
      successMsg.style.display = "none";
      errorMsg.style.display = "none";

      const payload = { address, lowPressure, feedDirection, comments };

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          mode: "no-cors"
        });

        successMsg.style.display = "block";
        form.reset();
        charCount.textContent = "0";

      } catch (err) {
        errorMsg.style.display = "block";
        console.error("Submission error:", err);
      } finally {
        submitBtn.disabled = false;
        btnText.style.display = "inline";
        spinner.style.display = "none";
      }
    });
  </script>

</body></html>
