<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Pressure Map</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef4fb; }
.header { background: #1a3c5e; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 20px; }
.header span { font-size: 28px; }
.controls { background: white; padding: 16px 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.filter-btn { padding: 8px 16px; border: 2px solid #d0dce8; border-radius: 20px; background: white; cursor: pointer; font-size: 14px; font-weight: 600; color: #444; transition: all 0.2s; }
.filter-btn:hover { border-color: #2980b9; color: #2980b9; }
.filter-btn.active { background: #2980b9; color: white; border-color: #2980b9; }
.filter-btn.red.active { background: #e74c3c; border-color: #e74c3c; }
.filter-btn.green.active { background: #27ae60; border-color: #27ae60; }
.stats { margin-left: auto; display: flex; gap: 16px; }
.stat { text-align: center; }
.stat-number { font-size: 22px; font-weight: 700; color: #1a3c5e; }
.stat-label { font-size: 11px; color: #6b7c93; }
#map { width: 100%; height: calc(100vh - 130px); }
.legend { position: absolute; bottom: 40px; left: 10px; background: white; padding: 12px 16px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); font-size: 13px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.legend-dot { width: 14px; height: 14px; border-radius: 50%; }
.loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 24px 32px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); text-align: center; font-size: 16px; color: #1a3c5e; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
<span>💧</span>
<h1>Water Pressure Survey Map</h1>
</div>

<div class="controls">
<button class="filter-btn active" onclick="filterMap('all')">All Properties</button>
<button class="filter-btn red" onclick="filterMap('yes')">Low Pressure</button>
<button class="filter-btn green" onclick="filterMap('no')">Normal Pressure</button>
<button class="filter-btn" onclick="filterMap('above')">Feed From Above</button>
<button class="filter-btn" onclick="filterMap('below')">Feed From Below</button>
<div class="stats">
<div class="stat">
<div class="stat-number" id="totalCount">0</div>
<div class="stat-label">Total</div>
</div>
<div class="stat">
<div class="stat-number" id="lowCount" style="color:#e74c3c;">0</div>
<div class="stat-label">Low Pressure</div>
</div>
<div class="stat">
<div class="stat-number" id="normalCount" style="color:#27ae60;">0</div>
<div class="stat-label">Normal</div>
</div>
</div>
</div>

<div id="loadingDiv" class="loading">Loading survey data...</div>
<div id="map"></div>

<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:#e74c3c;"></div> Low Water Pressure</div>
<div class="legend-item"><div class="legend-dot" style="background:#27ae60;"></div> Normal Water Pressure</div>
<div class="legend-item"><div class="legend-dot" style="background:#f39c12;"></div> Unsure</div>
</div>

<script>
const SHEET_ID = "YOUR_SHEET_ID_HERE";
const API_KEY = "YOUR_API_KEY_HERE";
const SHEET_URL = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/Sheet1?key=" + API_KEY;

let map;
let markers = [];
let allData = [];

async function initMap() {
map = new google.maps.Map(document.getElementById("map"), {
center: { lat: 54.5, lng: -3.5 },
zoom: 7,
mapTypeControl: true,
streetViewControl: false,
styles: [
{ featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }
]
});

await loadSheetData();
}

async function loadSheetData() {
try {
const response = await fetch(SHEET_URL);
const data = await response.json();
const rows = data.values;

if (!rows || rows.length <= 1) {
document.getElementById("loadingDiv").textContent = "No survey data found yet.";
return;
}

document.getElementById("loadingDiv").style.display = "none";

const dataRows = rows.slice(1);
allData = [];

let lowCount = 0;
let normalCount = 0;

for (const row of dataRows) {
const timestamp = row[0] || "";
const address = row[1] || "";
const lowPressure = row[2] || "";
const feedDirection = row[3] || "";
const comments = row[4] || "";

if (!address) continue;

const coords = await geocodeAddress(address);
if (!coords) continue;

const entry = { timestamp, address, lowPressure, feedDirection, comments, coords };
allData.push(entry);

if (lowPressure.toLowerCase() === "yes") lowCount++;
else if (lowPressure.toLowerCase() === "no") normalCount++;

addMarker(entry);
}

document.getElementById("totalCount").textContent = allData.length;
document.getElementById("lowCount").textContent = lowCount;
document.getElementById("normalCount").textContent = normalCount;

if (allData.length > 0) {
const bounds = new google.maps.LatLngBounds();
markers.forEach(m => bounds.extend(m.marker.getPosition()));
map.fitBounds(bounds);
}

} catch (err) {
document.getElementById("loadingDiv").textContent = "Error loading data. Please check your Sheet ID and API Key.";
console.error(err);
}
}

async function geocodeAddress(address) {
try {
const url = "https://maps.googleapis.com/maps/api/geocode/json?address=" + encodeURIComponent(address) + "&key=" + API_KEY;
const response = await fetch(url);
const data = await response.json();
if (data.results && data.results.length > 0) {
return data.results[0].geometry.location;
}
return null;
} catch (err) {
return null;
}
}

function getMarkerColor(lowPressure) {
if (lowPressure.toLowerCase() === "yes") return "http://maps.google.com/mapfiles/ms/icons/red-dot.png";
if (lowPressure.toLowerCase() === "no") return "http://maps.google.com/mapfiles/ms/icons/green-dot.png";
return "http://maps.google.com/mapfiles/ms/icons/orange-dot.png";
}

function addMarker(entry) {
const marker = new google.maps.Marker({
position: entry.coords,
map: map,
icon: getMarkerColor(entry.lowPressure),
title: entry.address
});

const infoContent = `
<div style="font-family:'Segoe UI',sans-serif; padding:8px; max-width:260px;">
<div style="font-weight:700; color:#1a3c5e; margin-bottom:8px; font-size:15px;">📍 ${entry.address}</div>
<div style="margin-bottom:4px;"><span style="font-weight:600;">Low Pressure:</span> ${entry.lowPressure}</div>
<div style="margin-bottom:4px;"><span style="font-weight:600;">Feed Direction:</span> ${entry.feedDirection}</div>
${entry.comments ? `<div style="margin-bottom:4px;"><span style="font-weight:600;">Comments:</span> ${entry.comments}</div>` : ""}
<div style="margin-top:8px; font-size:11px; color:#6b7c93;">${entry.timestamp}</div>
</div>`;

const infoWindow = new google.maps.InfoWindow({ content: infoContent });
marker.addListener("click", () => infoWindow.open(map, marker));

markers.push({ marker, data: entry });
}

function filterMap(filter) {
document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
event.target.classList.add("active");

markers.forEach(({ marker, data }) => {
let visible = false;
if (filter === "all") visible = true;
else if (filter === "yes") visible = data.lowPressure.toLowerCase() === "yes";
else if (filter === "no") visible = data.lowPressure.toLowerCase() === "no";
else if (filter === "above") visible = data.feedDirection.toLowerCase() === "above";
else if (filter === "below") visible = data.feedDirection.toLowerCase() === "below";
marker.setVisible(visible);
});
}

window.initMap = initMap;
</script>

<script async="" defer="" src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&amp;callback=initMap"></script>


</body></html>
